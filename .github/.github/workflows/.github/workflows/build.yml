name: ساخت خودکار APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: دریافت کدها
      uses: actions/checkout@v3
    
    - name: نصب Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    
    - name: نصب Capacitor
      run: |
        npm install
        npm install -g @capacitor/cli
    
    - name: افزودن اندروید
      run: npx cap add android
    
    - name: همگام‌سازی
      run: npx cap sync android
    
    - name: ساخت APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: آپلود APK
      uses: actions/upload-artifact@v3
      with:
        name: my-app
        path: android/app/build/outputs/apk/debug/app-debug.apk

        افزودن تنظیمات ساخت خودکار APK
